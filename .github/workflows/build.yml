name: Build GDExtension

on:
  push:
    branches: [main, master, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.config }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        config: [Debug, Release]

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      # ── ccache (Linux/macOS only) ─────────
      - name: Setup ccache (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ccache

      - name: Setup ccache (macOS)
        if: runner.os == 'macOS'
        run: brew install ccache

      - name: Restore ccache
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ matrix.config }}-${{ hashFiles('src/**/*.cpp', 'src/**/*.h') }}
          restore-keys: ccache-${{ runner.os }}-${{ matrix.config }}-

      - name: Show ccache stats
        if: runner.os != 'Windows'
        run: ccache -s || true

      # ── Godot-cpp dep cache (biggest time sink) ─
      - name: Restore godot-cpp build cache
        uses: actions/cache@v4
        with:
          path: build
          key: gdext-build-${{ runner.os }}-${{ matrix.config }}-${{ hashFiles('src/**/*.cpp', 'src/**/*.h', 'CMakeLists.txt') }}
          restore-keys: |
            gdext-build-${{ runner.os }}-${{ matrix.config }}-
            gdext-build-${{ runner.os }}-

      # ── Windows ──────────────────────────────
      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -S . -G "Visual Studio 17 2022" -A x64

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config ${{ matrix.config }} --target godot_fairygui --parallel $env:NUMBER_OF_PROCESSORS

      - name: Copy + rename (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          BIN="example/addons/godot_fairygui/bin"
          TEMPLATE="${{ matrix.config == 'Debug' && 'template_debug' || 'template_release' }}"
          cp "$BIN/godot_fairygui.dll" \
             "$BIN/godot_fairygui.windows.$TEMPLATE.x86_64.dll"

      # ── Linux ────────────────────────────────
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake build-essential pkg-config \
            libx11-dev libxcursor-dev libxinerama-dev \
            libgl1-mesa-dev libxrandr-dev libxi-dev \
            libasound2-dev libpulse-dev

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build -S . -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build --config ${{ matrix.config }} --target godot_fairygui --parallel $(nproc)

      - name: Copy + rename (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          BIN="example/addons/godot_fairygui/bin"
          TEMPLATE="${{ matrix.config == 'Debug' && 'template_debug' || 'template_release' }}"
          cp "$BIN/libgodot_fairygui.so" \
             "$BIN/libgodot_fairygui.linux.$TEMPLATE.x86_64.so"

      # ── macOS ────────────────────────────────
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake pkg-config

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build -S . -G "Xcode" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: cmake --build build --config ${{ matrix.config }} --target godot_fairygui --parallel $(sysctl -n hw.logicalcpu)

      - name: Copy + rename (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          BIN="example/addons/godot_fairygui/bin"
          TEMPLATE="${{ matrix.config == 'Debug' && 'template_debug' || 'template_release' }}"
          mkdir -p "$BIN/libgodot_fairygui.macos.$TEMPLATE.framework"
          cp "$BIN/libgodot_fairygui.dylib" \
             "$BIN/libgodot_fairygui.macos.$TEMPLATE.framework/libgodot_fairygui.dylib"

      - name: Show ccache stats (post)
        if: runner.os != 'Windows'
        run: ccache -s || true

      # ── Smoke test (Linux only) ─────────────
      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        run: |
          set -x
          GODOT_URL="https://github.com/godotengine/godot/releases/download/4.5.1-stable/Godot_v4.5.1-stable_linux_headless.64"
          curl -fSL -o godot_binary "$GODOT_URL" || {
            echo "WARNING: Godot download failed, skipping smoke test"
            exit 0
          }
          chmod +x godot_binary
          ./godot_binary --headless --path example res://scenes/smoke_test.tscn --quit 2>&1 | tee smoke_log.txt
          grep -q "GodotFairyGUI smoke: ok" smoke_log.txt || {
            echo "WARNING: Smoke test failed (non-critical)"
            tail -20 smoke_log.txt
            exit 0
          }
          echo "Smoke test passed."

      # ── Upload artifact ─────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}_${{ matrix.config }}
          path: |
            example/addons/godot_fairygui/bin/*.dll
            example/addons/godot_fairygui/bin/*.so
            example/addons/godot_fairygui/bin/*.framework
          if-no-files-found: error
          retention-days: 30

  package:
    name: Package addon release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout addon skeleton
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            example/addons/godot_fairygui
          path: addon

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Assemble bin directory
        run: |
          mkdir -p addon/example/addons/godot_fairygui/bin
          for d in _artifacts/*/; do
            cp "$d"/*.dll addon/example/addons/godot_fairygui/bin/ 2>/dev/null || true
            cp "$d"/*.so  addon/example/addons/godot_fairygui/bin/ 2>/dev/null || true
            cp -r "$d"/*.framework addon/example/addons/godot_fairygui/bin/ 2>/dev/null || true
          done
          ls -la addon/example/addons/godot_fairygui/bin/

      - name: Package archives
        run: |
          cd addon/example/addons
          tar czf "${{ github.workspace }}/godot_fairygui_addon.tar.gz" godot_fairygui/
          zip -r "${{ github.workspace }}/godot_fairygui_addon.zip" godot_fairygui/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            godot_fairygui_addon.tar.gz
            godot_fairygui_addon.zip
          generate_release_notes: true
